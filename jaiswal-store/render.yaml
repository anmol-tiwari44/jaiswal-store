services:
  - type: web
    name: jaiswal-store
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/jaiswal-store run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
